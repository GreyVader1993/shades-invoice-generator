<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator — Shraddha Tiwari</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }

  body {
    font-family: var(--font);
    background: #F5F4F0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .app-header {
    background: #fff;
    border-bottom: 1px solid #e8e6e1;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .hd-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .hd-sub { font-size: 12px; color: #888; margin-top: 1px; }

  .btn-hd {
    background: #1a1a1a; color: #fff; border: none;
    padding: 10px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font);
  }
  .btn-hd:active { opacity: 0.75; }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }

  .section {
    background: #fff; border-radius: 14px;
    border: 1px solid #e8e6e1; padding: 18px; margin-bottom: 14px;
  }

  .section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: #999; margin-bottom: 14px;
  }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block; font-size: 13px; font-weight: 500;
    color: #555; margin-bottom: 5px;
  }

  .field input, .field textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid #e0ddd8; border-radius: 8px;
    font-size: 15px; font-family: var(--font); color: #1a1a1a;
    background: #fafafa; outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .field input:focus, .field textarea:focus {
    border-color: #1a1a1a; background: #fff;
  }
  .field textarea { resize: vertical; min-height: 60px; line-height: 1.5; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .line-items { display: flex; flex-direction: column; gap: 10px; }

  .line-item {
    background: #F9F8F5; border: 1px solid #e8e6e1;
    border-radius: 10px; padding: 12px;
  }

  .line-item-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }

  .line-item-num {
    font-size: 11px; font-weight: 600; color: #aaa;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .btn-remove {
    width: 28px; height: 28px; border: none;
    background: #ffecec; color: #cc3333; border-radius: 6px;
    cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font);
  }

  .line-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .line-item input {
    width: 100%; padding: 8px 10px;
    border: 1px solid #e0ddd8; border-radius: 7px;
    font-size: 14px; font-family: var(--font);
    background: #fff; outline: none;
    -webkit-appearance: none; appearance: none; color: #1a1a1a;
  }
  .line-item input:focus { border-color: #1a1a1a; }

  .line-amount {
    font-size: 15px; font-weight: 600;
    color: #1a1a1a; text-align: right; padding-top: 6px;
  }

  .btn-add {
    width: 100%; padding: 11px;
    border: 1.5px dashed #c8c5be; border-radius: 10px;
    background: transparent; color: #888;
    font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: var(--font); margin-top: 10px;
  }

  .total-row {
    display: flex; justify-content: space-between;
    align-items: center; padding: 4px 0; font-size: 15px;
  }
  .total-row.grand {
    border-top: 1.5px solid #1a1a1a; padding-top: 12px;
    margin-top: 4px; font-size: 20px; font-weight: 700;
  }
  .total-label { color: #555; font-size: 14px; }
  .total-label.grand { color: #1a1a1a; font-size: 18px; font-weight: 600; }

  .btn-pdf {
    width: 100%; padding: 14px;
    background: #1a1a1a; color: #fff; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-bottom: 10px; font-family: var(--font);
  }
  .btn-pdf:active { opacity: 0.75; }
  .btn-pdf:disabled { opacity: 0.5; cursor: not-allowed; }

  .print-note {
    text-align: center; padding: 12px;
    font-size: 13px; color: #888; line-height: 1.5;
  }

  /* Overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 1000;
    overflow-y: auto; padding: 20px;
  }
  .overlay.active { display: block; }

  .preview-card {
    background: #fff; border-radius: 16px;
    max-width: 620px; margin: 0 auto;
    padding: 0; position: relative; overflow: hidden;
  }

  .preview-actions {
    display: flex; gap: 10px; padding: 16px 20px;
    border-top: 1px solid #e8e6e1; background: #fff;
  }

  .preview-actions button {
    flex: 1; padding: 13px; border-radius: 10px;
    font-size: 15px; font-weight: 500; cursor: pointer;
    font-family: var(--font);
  }
  .btn-dl { background: #1a1a1a; color: #fff; border: none; }
  .btn-dl:active { opacity: 0.75; }
  .btn-dl:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cl { background: transparent; color: #1a1a1a; border: 1.5px solid #1a1a1a; }

  /* ---- Invoice preview (inside overlay) ---- */
  #inv-preview-wrap {
    padding: 40px 40px 28px;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    color: #1a1a1a;
  }

  #inv-preview-wrap .p-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px;
    background: #f0efe9; border: none; border-radius: 50%;
    font-size: 18px; cursor: pointer; color: #555;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font); z-index: 2;
  }

  #inv-preview-wrap .p-title {
    font-size: 30px; font-weight: 700;
    letter-spacing: -1px; margin-bottom: 22px;
  }

  #inv-preview-wrap .p-parties {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; margin-bottom: 20px;
    font-size: 13.5px; line-height: 1.65;
  }

  #inv-preview-wrap .p-bold { font-weight: 700; }

  #inv-preview-wrap .p-meta {
    font-size: 13.5px; margin-bottom: 24px;
  }

  #inv-preview-wrap table {
    width: 100%; border-collapse: collapse;
    font-size: 13px; margin-bottom: 20px;
    table-layout: fixed;
  }

  #inv-preview-wrap thead th {
    border-top: 2px solid #1a1a1a;
    border-bottom: 2px solid #1a1a1a;
    padding: 7px 6px; text-align: left;
    font-size: 12px; font-weight: 700;
    font-family: var(--font);
  }
  #inv-preview-wrap thead th:nth-child(4),
  #inv-preview-wrap thead th:nth-child(5) { text-align: right; }

  #inv-preview-wrap colgroup col:nth-child(1) { width: 18%; }
  #inv-preview-wrap colgroup col:nth-child(2) { width: 32%; }
  #inv-preview-wrap colgroup col:nth-child(3) { width: 22%; }
  #inv-preview-wrap colgroup col:nth-child(4) { width: 12%; }
  #inv-preview-wrap colgroup col:nth-child(5) { width: 16%; }

  #inv-preview-wrap tbody td {
    padding: 9px 6px; border-bottom: 1px solid #e0ddd8;
    vertical-align: top;
  }
  #inv-preview-wrap tbody td:nth-child(4),
  #inv-preview-wrap tbody td:nth-child(5) {
    text-align: right; white-space: nowrap;
  }

  #inv-preview-wrap .p-total-wrap {
    display: flex; justify-content: flex-end; margin-bottom: 22px;
  }
  #inv-preview-wrap .p-total-inner { min-width: 210px; }
  #inv-preview-wrap .p-total-row {
    display: flex; justify-content: space-between;
    gap: 32px; font-size: 13.5px; padding: 3px 0;
  }
  #inv-preview-wrap .p-total-row.grand {
    border-top: 2px solid #1a1a1a;
    padding-top: 8px; margin-top: 4px;
    font-weight: 700; font-size: 15px;
  }

  #inv-preview-wrap .p-note {
    font-size: 13px; color: #555; line-height: 1.7;
  }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="hd-title">Invoice Generator</div>
    <div class="hd-sub">Shraddha Tiwari</div>
  </div>
  <button class="btn-hd" onclick="showPreview()">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
    Preview
  </button>
</div>

<div class="container">

  <div class="section">
    <div class="section-title">Invoice Details</div>
    <div class="row-2">
      <div class="field">
        <label>Invoice #</label>
        <input type="text" id="inv-num" value="001">
      </div>
      <div class="field">
        <label>Date</label>
        <input type="date" id="inv-date">
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">From</div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="from-name" value="Shraddha Tiwari">
    </div>
    <div class="field">
      <label>Address</label>
      <textarea id="from-addr" rows="2">7319 Parkwood Cir, Apt A
Dublin, CA 94568</textarea>
    </div>
    <div class="field">
      <label>Email (optional)</label>
      <input type="email" id="from-email" placeholder="your@email.com">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Bill To</div>
    <div class="field">
      <label>Organization / Name</label>
      <input type="text" id="to-name" value="India Community Center (ICC)">
    </div>
    <div class="field">
      <label>Address</label>
      <textarea id="to-addr" rows="2">525 Los Coches Street
Milpitas, CA 95035</textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Services</div>
    <div class="line-items" id="line-items"></div>
    <button class="btn-add" onclick="addLineItem()">+ Add service</button>
  </div>

  <div class="section">
    <div class="section-title">Summary</div>
    <div id="totals-display"></div>
  </div>

  <div class="section">
    <div class="section-title">Note (optional)</div>
    <div class="field" style="margin:0">
      <textarea id="inv-note" rows="2">Thank you for the opportunity to work with ICC. I appreciate your support and collaboration.</textarea>
    </div>
  </div>

  <div style="padding-bottom: 30px;">
    <button class="btn-pdf" onclick="showPreview()">Preview & Download PDF</button>
    <div class="print-note">Review the invoice, then download as a PDF file</div>
  </div>

</div>

<!-- Preview overlay -->
<div class="overlay" id="preview-overlay">
  <div class="preview-card">
    <div id="inv-preview-wrap">
      <button class="p-close" onclick="closePreview()">✕</button>
      <div id="invoice-preview"></div>
    </div>
    <div class="preview-actions">
      <button class="btn-cl" onclick="closePreview()">← Edit</button>
      <button class="btn-dl" id="dl-btn" onclick="downloadPDF()">
        ↓ Download PDF
      </button>
    </div>
  </div>
</div>

<script>
let lineItems = [];

function uid() { return Date.now() + Math.random().toString(36).slice(2,6); }

function fmt(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getItemAmount(item) {
  return (parseFloat(item.rate) || 0) * (parseFloat(item.hours) || 0);
}

function addLineItem(data) {
  lineItems.push({
    id: uid(),
    dates:   data?.dates   || '',
    service: data?.service || '',
    time:    data?.time    || '',
    rate:    data?.rate    || '40',
    hours:   data?.hours   || '10',
  });
  renderLineItems();
}

function removeLineItem(id) {
  lineItems = lineItems.filter(i => i.id !== id);
  renderLineItems();
}

function updateItem(id, key, val) {
  const item = lineItems.find(i => i.id === id);
  if (item) { item[key] = val; renderTotals(); refreshAmounts(); }
}

function refreshAmounts() {
  document.querySelectorAll('.line-amount').forEach((el, idx) => {
    if (lineItems[idx]) el.textContent = '$' + fmt(getItemAmount(lineItems[idx]));
  });
}

function renderLineItems() {
  const c = document.getElementById('line-items');
  c.innerHTML = '';
  lineItems.forEach((item, idx) => {
    const d = document.createElement('div');
    d.className = 'line-item';
    d.innerHTML = `
      <div class="line-item-header">
        <span class="line-item-num">Line ${idx + 1}</span>
        ${lineItems.length > 1 ? `<button class="btn-remove" onclick="removeLineItem('${item.id}')">✕</button>` : ''}
      </div>
      <div class="field" style="margin-bottom:8px">
        <label style="font-size:12px;color:#888;margin-bottom:4px">Dates</label>
        <input type="text" placeholder="e.g. June 1–5, 2026" value="${item.dates}"
          oninput="updateItem('${item.id}','dates',this.value)">
      </div>
      <div class="field" style="margin-bottom:8px">
        <label style="font-size:12px;color:#888;margin-bottom:4px">Service description</label>
        <input type="text" placeholder="e.g. Week 1 World Exploration and Physics" value="${item.service}"
          oninput="updateItem('${item.id}','service',this.value)">
      </div>
      <div class="field" style="margin-bottom:8px">
        <label style="font-size:12px;color:#888;margin-bottom:4px">Time</label>
        <input type="text" placeholder="e.g. 8:45am – 10:45am" value="${item.time}"
          oninput="updateItem('${item.id}','time',this.value)">
      </div>
      <div class="line-row-2" style="margin-bottom:6px">
        <div>
          <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Rate ($/hr)</label>
          <input type="number" placeholder="40" value="${item.rate}" min="0"
            oninput="updateItem('${item.id}','rate',this.value)" style="text-align:right">
        </div>
        <div>
          <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Hours</label>
          <input type="number" placeholder="10" value="${item.hours}" min="0" step="0.5"
            oninput="updateItem('${item.id}','hours',this.value)" style="text-align:right">
        </div>
      </div>
      <div class="line-amount">$${fmt(getItemAmount(item))}</div>
    `;
    c.appendChild(d);
  });
  renderTotals();
}

function renderTotals() {
  const total = lineItems.reduce((s, i) => s + getItemAmount(i), 0);
  document.getElementById('totals-display').innerHTML = `
    <div class="total-row">
      <span class="total-label">Subtotal</span>
      <span>$${fmt(total)}</span>
    </div>
    <div class="total-row grand">
      <span class="total-label grand">Total Due</span>
      <span>$${fmt(total)}</span>
    </div>
  `;
}

function buildPreviewHTML() {
  const invNum  = document.getElementById('inv-num').value || '—';
  const invDate = document.getElementById('inv-date').value;
  const dateStr = invDate
    ? new Date(invDate + 'T12:00:00').toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})
    : '—';
  const fromName  = document.getElementById('from-name').value;
  const fromAddr  = document.getElementById('from-addr').value.replace(/\n/g,'<br>');
  const fromEmail = document.getElementById('from-email').value;
  const toName    = document.getElementById('to-name').value;
  const toAddr    = document.getElementById('to-addr').value.replace(/\n/g,'<br>');
  const note      = document.getElementById('inv-note').value;
  const total     = lineItems.reduce((s, i) => s + getItemAmount(i), 0);

  const rows = lineItems.map(item => `
    <tr>
      <td>${item.dates || '—'}</td>
      <td>${item.service || '—'}</td>
      <td>${item.time || '—'}</td>
      <td>$${parseFloat(item.rate)||0}/HR</td>
      <td>$${fmt(getItemAmount(item))}</td>
    </tr>
  `).join('');

  return `
    <div class="p-title">INVOICE</div>
    <div class="p-parties">
      <div><span class="p-bold">From:</span><br>${fromName}<br>${fromAddr}${fromEmail ? '<br>' + fromEmail : ''}</div>
      <div><span class="p-bold">To:</span><br>${toName}<br>${toAddr}</div>
    </div>
    <div class="p-meta">
      <span class="p-bold">Invoice #:</span> ${invNum}&nbsp;&nbsp;&nbsp;
      <span class="p-bold">Invoice Date:</span> ${dateStr}
    </div>
    <table>
      <colgroup><col><col><col><col><col></colgroup>
      <thead>
        <tr>
          <th>Dates</th><th>Service</th><th>Time</th><th>Rate</th><th>Amount</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="p-total-wrap">
      <div class="p-total-inner">
        <div class="p-total-row grand">
          <span>Total Amount Due:</span>
          <span>$${fmt(total)}</span>
        </div>
      </div>
    </div>
    ${note ? `<div class="p-note">${note}</div>` : ''}
  `;
}

function showPreview() {
  document.getElementById('invoice-preview').innerHTML = buildPreviewHTML();
  document.getElementById('preview-overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('active');
  document.body.style.overflow = '';
}

async function downloadPDF() {
  const btn = document.getElementById('dl-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'pt', format: 'letter' });

    const margin  = 56;
    const pageW   = doc.internal.pageSize.getWidth();
    const usable  = pageW - margin * 2;
    let   y       = margin;

    const invNum  = document.getElementById('inv-num').value || '—';
    const invDate = document.getElementById('inv-date').value;
    const dateStr = invDate
      ? new Date(invDate + 'T12:00:00').toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})
      : '—';
    const fromName  = document.getElementById('from-name').value;
    const fromAddr  = document.getElementById('from-addr').value.split('\n');
    const fromEmail = document.getElementById('from-email').value;
    const toName    = document.getElementById('to-name').value;
    const toAddr    = document.getElementById('to-addr').value.split('\n');
    const note      = document.getElementById('inv-note').value;
    const total     = lineItems.reduce((s, i) => s + getItemAmount(i), 0);

    const sf = 96 / 72;  // screen→pt scaling helper

    // --- INVOICE title ---
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(28);
    doc.text('INVOICE', margin, y);
    y += 36;

    // --- From / To block ---
    const colW = usable / 2;
    doc.setFontSize(11);

    const drawParty = (label, name, addr, email, x) => {
      let ly = y;
      doc.setFont('helvetica', 'bold');
      doc.text(label, x, ly); ly += 15;
      doc.setFont('helvetica', 'normal');
      doc.text(name, x, ly); ly += 15;
      addr.forEach(line => { doc.text(line, x, ly); ly += 14; });
      if (email) { doc.text(email, x, ly); ly += 14; }
      return ly;
    };

    const yFromEnd = drawParty('From:', fromName, fromAddr, fromEmail, margin);
    const yToEnd   = drawParty('To:', toName, toAddr, '', margin + colW);
    y = Math.max(yFromEnd, yToEnd) + 10;

    // --- Invoice # / Date ---
    doc.setFont('helvetica', 'bold');
    doc.text('Invoice #: ', margin, y);
    const numW = doc.getTextWidth('Invoice #: ');
    doc.setFont('helvetica', 'normal');
    doc.text(invNum, margin + numW, y);

    const dateLabel = 'Invoice Date: ';
    const dateLabelW = doc.getTextWidth(dateLabel);
    doc.setFont('helvetica', 'bold');
    doc.text(dateLabel, margin + colW, y);
    doc.setFont('helvetica', 'normal');
    doc.text(dateStr, margin + colW + dateLabelW, y);
    y += 24;

    // --- Table header ---
    doc.setLineWidth(1.5);
    doc.line(margin, y, margin + usable, y); y += 10;

    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    const cols = [
      { label: 'Dates',   x: margin,              w: usable * 0.18, align: 'left' },
      { label: 'Service', x: margin + usable*0.18, w: usable * 0.32, align: 'left' },
      { label: 'Time',    x: margin + usable*0.50, w: usable * 0.22, align: 'left' },
      { label: 'Rate',    x: margin + usable*0.72, w: usable * 0.12, align: 'right' },
      { label: 'Amount',  x: margin + usable*0.84, w: usable * 0.16, align: 'right' },
    ];

    cols.forEach(c => {
      if (c.align === 'right') {
        doc.text(c.label, c.x + c.w, y, { align: 'right' });
      } else {
        doc.text(c.label, c.x, y);
      }
    });
    y += 6;
    doc.line(margin, y, margin + usable, y); y += 12;

    // --- Table rows ---
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);

    lineItems.forEach(item => {
      const cells = [
        item.dates || '—',
        item.service || '—',
        item.time || '—',
        '$' + (parseFloat(item.rate)||0) + '/HR',
        '$' + fmt(getItemAmount(item)),
      ];
      let maxH = 14;
      cells.forEach((text, i) => {
        const wrapped = doc.splitTextToSize(text, cols[i].w - 4);
        maxH = Math.max(maxH, wrapped.length * 13);
      });

      cells.forEach((text, i) => {
        const c = cols[i];
        const wrapped = doc.splitTextToSize(text, c.w - 4);
        if (c.align === 'right') {
          wrapped.forEach((line, li) => doc.text(line, c.x + c.w, y + li * 13, { align: 'right' }));
        } else {
          doc.text(wrapped, c.x, y);
        }
      });

      y += maxH;
      doc.setLineWidth(0.5);
      doc.setDrawColor(200, 200, 200);
      doc.line(margin, y, margin + usable, y);
      doc.setDrawColor(0, 0, 0);
      y += 10;
    });

    y += 6;

    // --- Total ---
    const totalLabel = 'Total Amount Due:';
    const totalVal   = '$' + fmt(total);
    const rightEdge  = margin + usable;
    const labelX     = rightEdge - 200;

    doc.setLineWidth(1.5);
    doc.line(labelX, y, rightEdge, y); y += 10;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12);
    doc.text(totalLabel, labelX, y);
    doc.text(totalVal, rightEdge, y, { align: 'right' });
    y += 24;

    // --- Note ---
    if (note) {
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(100, 100, 100);
      const wrapped = doc.splitTextToSize(note, usable);
      doc.text(wrapped, margin, y);
      doc.setTextColor(0, 0, 0);
    }

    // --- Save ---
    const fname = `Invoice-${invNum}-Shraddha-Tiwari.pdf`;
    doc.save(fname);
  } catch (err) {
    alert('PDF generation failed: ' + err.message);
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = '↓ Download PDF';
  }
}

  document.getElementById('inv-date').value = new Date().toISOString().split('T')[0];
  addLineItem({ dates: 'June 1–5, 2026', service: 'Week 1 World Exploration and Physics', time: '8:45am – 10:45am', rate: '40', hours: '10' });
  addLineItem({ dates: 'June 1–5, 2026', service: 'Week 1 Art', time: '10:45am – 12:45pm', rate: '40', hours: '10' });
});
</script>
